# poly-status — Tailscale-only nginx site.
# Listen on the VM's Tailscale IP only; the public OCI IP stays untouched.
# Edit the listen address to match `tailscale ip -4` on your VM.
# Install: copy to /etc/nginx/sites-available/poly-status, symlink into
# sites-enabled/, remove the default site, then `sudo nginx -t && systemctl reload nginx`.

server {
    listen 100.64.0.103:80 default_server;
    server_name _;

    root /var/www/poly;
    index index.html;

    # Status page itself — no caching so refreshes always pick up the latest
    # cron-generated snapshot.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Tiny noise reduction.
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; return 200 "User-agent: *\nDisallow: /\n"; }
}
